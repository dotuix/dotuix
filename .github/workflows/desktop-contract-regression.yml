name: Desktop Contract Regression

on:
  pull_request:
    paths:
      - "apps/viewer/**"
      - "packages/core/**"
      - "packages/cli/**"
      - "packages/types/**"
      - "spec/spec.md"
      - ".github/workflows/desktop-contract-regression.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - main
    paths:
      - "apps/viewer/**"
      - "packages/core/**"
      - "packages/cli/**"
      - "packages/types/**"
      - "spec/spec.md"
      - ".github/workflows/desktop-contract-regression.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  desktop-contract-regression:
    name: Desktop Contract Regression
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Core tests
        run: pnpm --filter @dotuix/core test

      - name: CLI build
        run: pnpm --filter @dotuix/cli build

      - name: Viewer web build
        run: pnpm --filter @dotuix/viewer vite:build

      - name: Viewer tauri contract check
        run: cd apps/viewer/src-tauri && cargo check

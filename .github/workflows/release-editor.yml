name: Release Editor

# Trigger on editor-specific tags: e.g. editor-v0.2.0
# (kept separate from viewer releases)
on:
  push:
    tags:
      - "editor-v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `dotuix Editor ${tag.replace('editor-', '')}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });
            core.setOutput('id', release.id);
            return release.id;

  build:
    name: Build — ${{ matrix.label }}
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS
          - platform: ubuntu-22.04
            label: Linux
          - platform: windows-latest
            label: Windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # Linux: libraries required by Electron
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2

      - name: Install dependencies
        run: pnpm install

      - name: Build core (workspace dep)
        run: pnpm --filter @dotuix/core build

      - name: Build and package editor
        working-directory: apps/editor
        run: pnpm package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder reads GH_TOKEN to upload artifacts
          CSC_IDENTITY_AUTO_DISCOVERY: false  # skip macOS code-signing for now

      - name: Upload release assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = ${{ needs.create-release.outputs.release-id }};
            const releaseDir = 'apps/editor/release';

            const exts = ['.dmg', '.exe', '.AppImage', '.deb', '.zip'];
            const files = fs.readdirSync(releaseDir).filter(f =>
              exts.some(ext => f.endsWith(ext)) && !f.endsWith('.blockmap')
            );

            for (const file of files) {
              const filePath = path.join(releaseDir, file);
              const stat = fs.statSync(filePath);
              if (!stat.isFile()) continue;
              console.log(`Uploading ${file} (${(stat.size / 1024 / 1024).toFixed(1)} MB)`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: file,
                data: fs.readFileSync(filePath),
              });
            }

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [create-release, build]
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release-id }},
              draft: false,
            });
